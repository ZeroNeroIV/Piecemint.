# Piecemint + marketplace (each: FastAPI + built SPA).
# Usage from repo root:
#   docker compose up --build
#   Piecemint: http://localhost:8080
#   Marketplace: http://localhost:9081
#
# SQLite for Piecemint is in volume piecemint-sqlite at /data/piecemint.db.
#
# If Docker overlayfs/containerd errors occur locally, build with Podman (see earlier comments).

services:
  api:
    build:
      context: .
      dockerfile: piecemint/backend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_MARKETPLACE_URL: http://localhost:9081
    ports:
      - "8080:8000"
      - "8000:8000"
    environment:
      PIECEMINT_DATABASE_URL: sqlite:////data/piecemint.db
      PIECEMINT_STATIC_DIR: /app/static
    volumes:
      - piecemint-sqlite:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')",
        ]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 45s

  marketplace:
    build:
      context: .
      dockerfile: marketplace/backend/Dockerfile
      args:
        VITE_MAIN_APP_URL: http://localhost:8080
        VITE_MARKETPLACE_API_URL: /api
    ports:
      - "9081:8000"
    environment:
      MARKETPLACE_STATIC_DIR: /app/marketplace/backend/static

volumes:
  piecemint-sqlite:
