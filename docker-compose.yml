# Piecemint: single image (FastAPI + built SPA).
# Usage from repo root:
#   docker compose up --build
#   open http://localhost:8080  or  http://localhost:8000
#
# If Docker fails with overlayfs/containerd snapshot errors, build and run with Podman:
#   podman build -f piecemint/backend/Dockerfile -t prototype2-api --build-arg VITE_API_URL=/api --build-arg VITE_MARKETPLACE_URL=http://localhost:5174 .
#   podman run --rm -p 8080:8000 -e PIECEMINT_DATABASE_URL=sqlite:////data/piecemint.db -e PIECEMINT_STATIC_DIR=/app/static -v piecemint-sqlite:/data localhost/prototype2-api
#
# SQLite is stored in the `piecemint-sqlite` volume at /data/piecemint.db.

services:
  api:
    build:
      context: .
      dockerfile: piecemint/backend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_MARKETPLACE_URL: http://localhost:5174
    ports:
      - "8080:8000"
      - "8000:8000"
    environment:
      PIECEMINT_DATABASE_URL: sqlite:////data/piecemint.db
      PIECEMINT_STATIC_DIR: /app/static
    volumes:
      - piecemint-sqlite:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')",
        ]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 45s

volumes:
  piecemint-sqlite:
