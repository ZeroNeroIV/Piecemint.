name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (${{ matrix.product }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        product: [piecemint, marketplace]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.product }}/frontend/package-lock.json

      - name: Install, build, lint
        working-directory: ${{ matrix.product }}/frontend
        run: |
          npm ci
          npm run build
          npm run lint

      - name: Upload dist (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.product }}-frontend-dist
          path: ${{ matrix.product }}/frontend/dist
          if-no-files-found: error

  backend:
    name: Backend (${{ matrix.product }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: piecemint
            workdir: piecemint/backend
            python-version: "3.14"
          - product: marketplace
            workdir: marketplace/backend
            python-version: "3.13"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (piecemint / Pipenv)
        if: matrix.product == 'piecemint'
        working-directory: ${{ matrix.workdir }}
        run: |
          pip install pipenv
          pipenv install --deploy

      - name: Smoke import (piecemint)
        if: matrix.product == 'piecemint'
        working-directory: ${{ matrix.workdir }}
        run: pipenv run python -c "from api.main import app; assert app.title == 'Piecemint API'"

      - name: Install dependencies (marketplace)
        if: matrix.product == 'marketplace'
        working-directory: ${{ matrix.workdir }}
        run: pip install -r requirements.txt

      - name: Smoke import (marketplace)
        if: matrix.product == 'marketplace'
        working-directory: ${{ matrix.workdir }}
        run: python -c "import main; assert main.app.title == 'MarketPlace API'"
